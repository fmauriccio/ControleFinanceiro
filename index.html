<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyFinance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0d14; --bg-secondary: #0f1420; --bg-card: #141928;
    --bg-card-hover: #1a2035; --bg-glass: rgba(20, 25, 40, 0.8);
    --accent-green: #00e5a0; --accent-blue: #4d9fff; --accent-purple: #a855f7;
    --accent-orange: #ff7849; --accent-red: #ff4d6d; --accent-yellow: #ffd166;
    --text-primary: #f0f4ff; --text-secondary: #8892b0; --text-muted: #4a5568;
    --border: rgba(255,255,255,0.07); --border-accent: rgba(0, 229, 160, 0.3);
    --shadow: 0 8px 32px rgba(0,0,0,0.4); --shadow-green: 0 0 20px rgba(0,229,160,0.15);
    --radius: 16px; --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

  /* Layout */
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border); z-index: 100; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .logo-text span { color: var(--accent-green); }
  .nav-section { padding: 20px 12px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary); font-size: 14px; margin-bottom: 2px; }
  .nav-item:hover, .nav-item.active { background: rgba(0,229,160,0.1); color: var(--accent-green); }
  
  .main { margin-left: 240px; min-height: 100vh; }
  .topbar { position: sticky; top: 0; background: rgba(10,13,20,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
  .content { padding: 28px 32px; }

  /* Components */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .kpi-card { background: var(--bg-card); padding: 20px; border-radius: var(--radius); border-top: 3px solid var(--accent-green); }
  .btn { padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
  .btn-primary { background: var(--accent-green); color: #0a0d14; }
  .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
  
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-secondary); padding: 28px; border-radius: var(--radius); width: 100%; max-width: 500px; }
  
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { text-align: left; color: var(--text-muted); font-size: 11px; padding: 10px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

  .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0; }
  .progress-fill { height: 100%; border-radius: 10px; transition: 0.5s; }
  
  .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .cat-essencial { background: rgba(0,229,160,0.15); color: var(--accent-green); }

  .form-group { margin-bottom: 15px; }
  .form-input, .form-select { width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border); color: white; border-radius: 8px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-text">Family<span>Finance</span></div></div>
  <nav class="nav-section">
    <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
    <div class="nav-item" onclick="showPage('despesas')">💸 Despesas</div>
    <div class="nav-item" onclick="showPage('cartoes')">💳 Cartões</div>
    <div class="nav-item" onclick="showPage('renda')">💰 Renda</div>
    <div class="nav-item" onclick="showPage('metas')">🎯 Metas</div>
  </nav>
  <div class="month-selector">
    <button class="btn btn-secondary" style="width: 90%; margin: 10px;" onclick="changeMonth()">
      <span id="monthLabel">Carregando...</span>
    </button>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <h1 id="pageTitle">Dashboard</h1>
    <button class="btn btn-primary" onclick="openModalByPage()">+ Adicionar</button>
  </header>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="grid-4">
        <div class="kpi-card"><div>Renda</div><div id="summaryRenda">R$ 0,00</div></div>
        <div class="kpi-card" style="border-color: var(--accent-red)"><div>Gastos</div><div id="summaryGastos">R$ 0,00</div></div>
        <div class="kpi-card" style="border-color: var(--accent-blue)"><div>Saldo</div><div id="summarySaldo">R$ 0,00</div></div>
        <div class="kpi-card" style="border-color: var(--accent-yellow)"><div>Cartões</div><div id="summaryCartoes">R$ 0,00</div></div>
      </div>
      <div class="grid-2">
        <div class="card"><h3>Últimas Despesas</h3><div id="recentExpenses"></div></div>
        <div class="card"><h3>Resumo Mensal</h3><canvas id="chartPizza" height="200"></canvas></div>
      </div>
    </div>

    <!-- DESPESAS -->
    <div class="page" id="page-despesas">
        <div class="card">
            <table>
                <thead><tr><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Ações</th></tr></thead>
                <tbody id="tabelaDespesas"></tbody>
            </table>
        </div>
    </div>

    <!-- CARTOES -->
    <div class="page" id="page-cartoes">
        <div class="grid-2" id="creditCardsGrid"></div>
    </div>

    <!-- RENDA -->
    <div class="page" id="page-renda">
        <div class="grid-4" id="membrosGrid"></div>
    </div>

    <!-- METAS -->
    <div class="page" id="page-metas">
        <div id="metasContainer"></div>
    </div>
  </div>
</main>

<!-- MODAL DESPESA -->
<div class="modal-overlay" id="modalDespesa">
    <div class="modal">
        <h2>Nova Despesa</h2>
        <div class="form-group"><label>Descrição</label><input type="text" id="desp_desc" class="form-input"></div>
        <div class="form-group"><label>Valor</label><input type="number" id="desp_val" class="form-input"></div>
        <div class="form-group">
            <label>Categoria</label>
            <select id="desp_cat" class="form-select">
                <option value="Moradia">Moradia</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Lazer">Lazer</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="saveDespesa()">Salvar</button>
        <button class="btn btn-secondary" onclick="closeModal('modalDespesa')">Fechar</button>
    </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://hlbwvxsqihepqjcsomtv.supabase.co";
  const SUPABASE_KEY = "sb_publishable_GH1BVJY0I_CqlybFY2gs5A_HHQFf8Xf";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let state = {
    membros: [], despesas: [], cartoes: [], compras: [], metas: [],
    currentMonth: new Date().toISOString().slice(0, 7),
    currentPage: 'dashboard'
  };

  async function loadData() {
    const { data: m } = await supabase.from("membros").select("*");
    const { data: d } = await supabase.from("despesas").select("*");
    const { data: c } = await supabase.from("cartoes").select("*");
    const { data: co } = await supabase.from("compras").select("*");
    const { data: me } = await supabase.from("metas").select("*");
    
    state.membros = m || [];
    state.despesas = d || [];
    state.cartoes = c || [];
    state.compras = co || [];
    state.metas = me || [];
    
    renderAll();
  }

  // Expor funções para o HTML (escopo global)
  window.showPage = (pageId) => {
    state.currentPage = pageId;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.getElementById('pageTitle').textContent = pageId.charAt(0).toUpperCase() + pageId.slice(1);
    
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.classList.toggle('active', nav.getAttribute('onclick').includes(pageId));
    });
    renderAll();
  };

  window.openModalByPage = () => {
    if(state.currentPage === 'dashboard' || state.currentPage === 'despesas') openModal('modalDespesa');
    else alert("Adicionar funcionalidade para: " + state.currentPage);
  };

  window.openModal = (id) => document.getElementById(id).classList.add('open');
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');

  window.saveDespesa = async () => {
    const obj = {
        desc: document.getElementById('desp_desc').value,
        valor: parseFloat(document.getElementById('desp_val').value),
        categoria: document.getElementById('desp_cat').value,
        mes: state.currentMonth,
        grupo: 'essencial'
    };
    await supabase.from("despesas").insert(obj);
    closeModal('modalDespesa');
    loadData();
  };

  window.changeMonth = () => {
    const d = new Date(state.currentMonth + "-01");
    d.setMonth(d.getMonth() + 1);
    state.currentMonth = d.toISOString().slice(0, 7);
    renderAll();
  };

  function renderAll() {
    const label = new Date(state.currentMonth + "-01").toLocaleDateString('pt-BR', {month:'short', year:'numeric'});
    document.getElementById('monthLabel').textContent = label;

    // Lógica de cálculo Dashboard
    const renda = state.membros.reduce((acc, cur) => acc + (cur.salario || 0), 0);
    const despMes = state.despesas.filter(d => d.mes === state.currentMonth);
    const totalDesp = despMes.reduce((acc, cur) => acc + (cur.valor || 0), 0);

    document.getElementById('summaryRenda').textContent = "R$ " + renda.toLocaleString();
    document.getElementById('summaryGastos').textContent = "R$ " + totalDesp.toLocaleString();
    document.getElementById('summarySaldo').textContent = "R$ " + (renda - totalDesp).toLocaleString();

    // Render Tabela Despesas
    const tbody = document.getElementById('tabelaDespesas');
    if(tbody) {
        tbody.innerHTML = despMes.map(d => `
            <tr><td>${d.desc}</td><td>${d.categoria}</td><td>R$ ${d.valor}</td><td><button onclick="deleteDesp('${d.id}')">🗑️</button></td></tr>
        `).join('');
    }
    
    // Render Recent
    document.getElementById('recentExpenses').innerHTML = despMes.slice(0,5).map(d => `<div style="padding:5px 0">${d.desc} - <b>R$ ${d.valor}</b></div>`).join('');
  }

  // Inicialização
  loadData();
</script>
</body>
</html>
