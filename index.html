<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyFinance | Sistema Integrado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0d14; --bg-secondary: #0f1420; --bg-card: #141928;
    --accent-green: #00e5a0; --accent-blue: #4d9fff; --accent-red: #ff4d6d;
    --accent-yellow: #ffd166; --text-primary: #f0f4ff; --text-secondary: #8892b0;
    --border: rgba(255,255,255,0.07); --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; }

  /* Navegação Lateral */
  .sidebar { width: 260px; height: 100vh; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 24px; position: fixed; display: flex; flex-direction: column; }
  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 40px; }
  .logo span { color: var(--accent-green); }
  .nav-group { flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; cursor: pointer; color: var(--text-secondary); margin-bottom: 4px; transition: 0.2s; }
  .nav-item:hover, .nav-item.active { background: rgba(0, 229, 160, 0.1); color: var(--accent-green); }

  /* Área Principal */
  .main { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  
  /* Cards e Grids */
  .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .kpi-card { border-top: 4px solid var(--accent-green); }
  
  /* Tabelas e Listas */
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th { text-align: left; font-size: 12px; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--border); }
  td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }

  /* Metas */
  .goal-item { margin-bottom: 20px; }
  .progress-bg { background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; margin: 8px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent-green); transition: width 1s ease-out; }

  /* Modais */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-secondary); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 480px; border: 1px solid var(--border); }
  
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  input, select { width: 100%; padding: 12px; background: var(--bg-primary); border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; }
  input:focus { border-color: var(--accent-green); }

  .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
  .btn-primary { background: var(--accent-green); color: #0a0d14; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,229,160,0.2); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Family<span>Finance</span></div>
  <nav class="nav-group">
    <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
    <div class="nav-item" onclick="showPage('despesas')">💸 Despesas Diretas</div>
    <div class="nav-item" onclick="showPage('cartoes')">💳 Cartões de Crédito</div>
    <div class="nav-item" onclick="showPage('renda')">💰 Renda Familiar</div>
    <div class="nav-item" onclick="showPage('metas')">🎯 Metas e Reservas</div>
  </nav>
  <div class="month-nav">
    <input type="month" id="globalMonth" onchange="updateGlobalMonth()" style="background: var(--bg-card); border: none;">
  </div>
</aside>

<main class="main">
  <header class="header">
    <h1 id="pageTitle">Dashboard</h1>
    <button class="btn btn-primary" onclick="handleNewEntry()">+ Adicionar Registro</button>
  </header>

  <div id="content">
    <!-- O conteúdo é injetado via JavaScript para manter a sincronia -->
    <div id="page-dashboard" class="page-container">
      <div class="grid-stats">
        <div class="card kpi-card"><span>Renda Mensal</span><h2 id="kpiRenda">R$ 0,00</h2></div>
        <div class="card kpi-card" style="border-color: var(--accent-red)"><span>Gastos Totais</span><h2 id="kpiGastos">R$ 0,00</h2></div>
        <div class="card kpi-card" style="border-color: var(--accent-blue)"><span>Saldo Disponível</span><h2 id="kpiSaldo">R$ 0,00</h2></div>
        <div class="card kpi-card" style="border-color: var(--accent-yellow)"><span>Fatura Cartões</span><h2 id="kpiCartoes">R$ 0,00</h2></div>
      </div>
      <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px;">
        <div class="card"><h3>Distribuição de Gastos</h3><canvas id="mainChart" height="200"></canvas></div>
        <div class="card"><h3>Resumo de Metas</h3><div id="dashboardMetas"></div></div>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabase = createClient("https://hlbwvxsqihepqjcsomtv.supabase.co", "sb_publishable_GH1BVJY0I_CqlybFY2gs5A_HHQFf8Xf");

  let state = {
    membros: [], despesas: [], cartoes: [], compras: [], metas: [],
    currentMonth: new Date().toISOString().slice(0, 7),
    activePage: 'dashboard'
  };

  async function loadAllData() {
    const responses = await Promise.all([
      supabase.from("membros").select("*"),
      supabase.from("despesas").select("*"),
      supabase.from("cartoes").select("*"),
      supabase.from("compras").select("*"),
      supabase.from("metas").select("*")
    ]);

    state.membros = responses[0].data || [];
    state.despesas = responses[1].data || [];
    state.cartoes = responses[2].data || [];
    state.compras = responses[3].data || [];
    state.metas = responses[4].data || [];

    render();
  }

  function calculateInstallments(compra, targetMonth) {
    const startDate = new Date(compra.data_compra + "-01");
    const targetDate = new Date(targetMonth + "-01");
    
    const diffMonths = (targetDate.getFullYear() - startDate.getFullYear()) * 12 + (targetDate.getMonth() - startDate.getMonth());
    
    if (diffMonths >= 0 && diffMonths < compra.parcelas) {
      return compra.valor_total / compra.parcelas;
    }
    return 0;
  }

  function render() {
    // 1. Cálculos de Renda
    const totalRenda = state.membros.reduce((acc, m) => acc + m.salario, 0);
    
    // 2. Cálculos de Cartão (Parcelas do mês)
    const totalCartao = state.compras.reduce((acc, c) => acc + calculateInstallments(c, state.currentMonth), 0);
    
    // 3. Cálculos de Despesas Fixas/Variáveis do mês
    const totalFixas = state.despesas
      .filter(d => d.mes === state.currentMonth)
      .reduce((acc, d) => acc + d.valor, 0);

    const totalGeral = totalFixas + totalCartao;

    // Atualiza KPIs do Dashboard
    document.getElementById('kpiRenda').innerText = `R$ ${totalRenda.toLocaleString('pt-BR')}`;
    document.getElementById('kpiGastos').innerText = `R$ ${totalGeral.toLocaleString('pt-BR')}`;
    document.getElementById('kpiCartoes').innerText = `R$ ${totalCartao.toLocaleString('pt-BR')}`;
    document.getElementById('kpiSaldo').innerText = `R$ ${(totalRenda - totalGeral).toLocaleString('pt-BR')}`;

    renderChart(totalFixas, totalCartao);
    renderGoals();
  }

  function renderGoals() {
    const container = document.getElementById('dashboardMetas');
    container.innerHTML = state.metas.map(meta => {
      const perc = Math.min((meta.atual / meta.objetivo) * 100, 100);
      return `
        <div class="goal-item">
          <div style="display:flex; justify-content:space-between; font-size:13px">
            <span>${meta.titulo}</span>
            <b>${perc.toFixed(1)}%</b>
          </div>
          <div class="progress-bg"><div class="progress-fill" style="width: ${perc}%"></div></div>
        </div>
      `;
    }).join('');
  }

  let myChart = null;
  function renderChart(fixas, cartao) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Contas Fixas', 'Fatura Cartão', 'Outros'],
        datasets: [{
          data: [fixas, cartao, 0],
          backgroundColor: ['#4d9fff', '#ffd166', '#a855f7'],
          borderWidth: 0,
          hoverOffset: 10
        }]
      },
      options: { plugins: { legend: { position: 'bottom', labels: { color: '#8892b0' } } } }
    });
  }

  // Funções Globais
  window.updateGlobalMonth = () => {
    state.currentMonth = document.getElementById('globalMonth').value;
    render();
  };

  window.showPage = (pageId) => {
    state.activePage = pageId;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    // Lógica para alternar visibilidade de containers de página...
    loadAllData(); // Recarrega para garantir
  };

  // Inicialização
  document.getElementById('globalMonth').value = state.currentMonth;
  loadAllData();
</script>
</body>
</html>
